<div class="container-fluid py-4">
    <h3 class="text-success mb-4"><i class="bi bi-people-fill me-2"></i>Vendor Directory</h3>

    <div class="row">
        <!-- Form Section -->
        <div class="col-md-4">
            <div class="card shadow-sm border-0 mb-4">
                <div class="card-header bg-success text-white fw-bold">Register New Vendor</div>
                <div class="card-body">
                    <form [formGroup]="vendorForm" (ngSubmit)="addVendor()">
                        <div class="mb-3">
                            <label class="form-label small">Business Name</label>
                            <input type="text" class="form-control" formControlName="name"
                                placeholder="e.g. Sudha Dairy">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small">Contact Person</label>
                            <input type="text" class="form-control" formControlName="contactPerson">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small">Phone Number</label>
                            <input type="text" class="form-control" formControlName="phone"
                                placeholder="10 digit number">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small">Category</label>
                            <select class="form-select" formControlName="category">
                                <option value="Dairy">Dairy Products</option>
                                <option value="Grains">Grains & Spices</option>
                                <option value="Packaging">Packaging Material</option>
                                <option value="Others">Others</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-success w-100" [disabled]="vendorForm.invalid">
                            Save Vendor
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Vendor List Section -->
        <div class="col-md-8">
            <div class="row" *ngIf="vendorList.length > 0; else noVendors">
                <div class="col-md-6 mb-3" *ngFor="let vendor of vendorList">
                    <div class="card h-100 border-0 shadow-sm border-top border-4"
                        [ngClass]="vendor.category === 'Dairy' ? 'border-primary' : 'border-warning'">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <h5 class="card-title mb-0">{{vendor.name}}</h5>
                                <span class="badge bg-light text-dark border">{{vendor.category}}</span>
                            </div>
                            <p class="mb-1 text-muted small"><i class="bi bi-person me-2"></i>{{vendor.contactPerson}}
                            </p>
                            <p class="mb-3"><i
                                    class="bi bi-telephone-fill me-2 text-success"></i><strong>{{vendor.phone}}</strong>
                            </p>

                            <div class="d-flex justify-content-between">
                                <a [href]="'tel:' + vendor.phone" class="btn btn-sm btn-outline-primary">
                                    <i class="bi bi-telephone"></i> Call
                                </a>
                                <button class="btn btn-sm btn-outline-danger" (click)="deleteVendor(vendor.id)">
                                    <i class="bi bi-trash"></i> Remove
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <ng-template #noVendors>
                <div class="text-center p-5 bg-white rounded shadow-sm">
                    <i class="bi bi-person-plus fs-1 text-muted"></i>
                    <p class="mt-3">Abhi tak koi vendor add nahi kiya gaya hai.</p>
                </div>
            </ng-template>
        </div>
    </div>
</div>
