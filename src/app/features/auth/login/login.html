<div class="auth-container d-flex align-items-center justify-content-center">
    <div class="card auth-card shadow-lg border-0 p-4">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-success">Kisan Portal</h2>
            <p class="text-muted">Apne account mein login karein</p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
            <div class="mb-3">
                <label class="form-label fw-bold">Email Address</label>
                <input type="email" class="form-control" formControlName="email" placeholder="name@example.com"
                    required>
            </div>

            <div class="mb-4">
                <label class="form-label small fw-bold">Password</label>
                <div class="input-group custom-pass-group">
                    <!-- Input Field: Right border hatayi gayi hai -->
                    <input [type]="showPassword ? 'text' : 'password'" class="form-control border-end-0 shadow-none"
                        formControlName="password" placeholder="*******" required>

                    <!-- Icon Wrapper: Left border hatayi gayi hai -->
                    <span class="input-group-text bg-white border-start-0 text-muted" (click)="togglePassword()"
                        style="cursor: pointer;">
                        <i class="bi" [ngClass]="showPassword ? 'bi-eye-slash-fill' : 'bi-eye-fill'"></i>
                    </span>
                </div>
            </div>

            <button type="submit" class="btn btn-success w-100 py-2 fw-bold" [disabled]="loginForm.invalid">
                Login
            </button>
        </form>

        <div class="text-center mt-3">
            <span class="small">Account nahi hai? </span>
            <a routerLink="/register" class="text-success fw-bold text-decoration-none">Register Karein</a>
        </div>
    </div>
</div>
