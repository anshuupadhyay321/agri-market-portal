<div class="container-fluid mt-4">
    <h3 class="mb-4 text-success"><i class="bi bi-gear-fill me-2"></i>Application Settings</h3>

    <div class="row">
        <!-- Appearance Card -->
        <div class="col-md-6 mb-4">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white fw-bold">Appearance</div>
                <div class="card-body">
                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input" type="checkbox" id="themeSwitch"
                            [checked]="settingsService.darkMode()"
                            (change)="settingsService.darkMode.set(!settingsService.darkMode())">
                        <label class="form-check-label" for="themeSwitch">Enable Dark Mode</label>
                    </div>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" role="switch"
                            [checked]="settingsService.compactMode()"
                            (change)="settingsService.compactMode.set(!settingsService.compactMode())">
                        <label class="form-check-label" for="compactSwitch">Compact Sidebar View</label>
                    </div>
                </div>
            </div>
        </div>

        <!-- Regional Settings -->
        <div class="col-md-6 mb-4">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white fw-bold">Regional & Business</div>
                <div class="card-body">
                    <label class="form-label small fw-bold">Default Mandi Region</label>
                    <select class="form-select mb-3">
                        <option selected>Buxar, Bihar</option>
                        <option>Patna, Bihar</option>
                        <option>Varanasi, UP</option>
                    </select>

                    <label class="form-label small fw-bold">Language</label>
                    <div class="d-flex gap-2">
                        <button class="btn btn-outline-success btn-sm active">English</button>
                        <button class="btn btn-outline-success btn-sm">Hindi (हिंदी)</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
